 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Test Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #28a745; color: white; border: none; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .result { text-align: center; font-size: 20px; color: #007bff; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Predict Test Results</h1>
        <form action="{{ url_for('predict') }}" method="post">

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>

            <label for="gender">Gender:</label>
            <select name="gender" id="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label for="blood_type">Blood Type:</label>
            <select name="blood_type" id="blood_type" required>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>

            <label for="medical_condition">Medical Condition:</label>
            <select name="medical_condition" id="medical_condition" required>
                <option value="Cancer">Cancer</option>
                <option value="Obesity">Obesity</option>
                <option value="Diabetes">Diabetes</option>
                <option value="Asthma">Asthma</option>
                <option value="Hypertension">Hypertension</option>
                <option value="Arthritis">Arthritis</option>
            </select>

            <label for="admission_type">Admission Type:</label>
            <select name="admission_type" id="admission_type" required>
                <option value="Urgent">Urgent</option>
                <option value="Emergency">Emergency</option>
                <option value="Elective">Elective</option>
            </select>

            <label for="medication">Medication:</label>
            <select name="medication" id="medication" required>
                <option value="Paracetamol">Paracetamol</option>
                <option value="Ibuprofen">Ibuprofen</option>
                <option value="Aspirin">Aspirin</option>
                <option value="Penicillin">Penicillin</option>
                <option value="Lipitor">Lipitor</option>
            </select>

            <button type="submit">Predict Result</button>
        </form>

        {% if prediction_text %}
            <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
